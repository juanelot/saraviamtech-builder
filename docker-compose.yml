version: '3.9'

services:
  saraviam-builder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saraviam-builder
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=3000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - KIEAI_API_KEY=${KIEAI_API_KEY}
    volumes:
      - ./data/generations:/app/data/generations
      - ./data/uploads:/app/data/uploads
      - ./public/sites:/app/public/sites
      - ./data/project.json:/app/data/project.json
      - ./data/sites-registry.json:/app/data/sites-registry.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
